services:
  app:
    build: .
    ports:
      - '8080:8080'
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8080
      DB_CONNECTION: sqlite
      RUN_MIGRATIONS: 'false'
    volumes:
      - sqlite-data:/var/www/html/storage/database
    restart: unless-stopped

volumes:
  sqlite-data:
