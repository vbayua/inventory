services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/database/database.sqlite
    volumes:
      - sqlite-data:/var/www/html/storage/database
    restart: unless-stopped

volumes:
  sqlite-data:
